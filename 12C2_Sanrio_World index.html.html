<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12C2 x Sanrio Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff85a2;
            --purple: #a29bfe;
            --yellow: #feca57;
            --bg: #fff5f7;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: #444;
            overflow-x: hidden;
        }

        /* --- NAVIGATION TABS --- */
        .nav-tabs {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            z-index: 2000;
            border: 1px solid white;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #888;
        }

        .tab-btn.active {
            background: var(--pink);
            color: white;
        }

        /* --- SECTION MANAGEMENT --- */
        .page-section { display: none; min-height: 100vh; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GAME SECTION STYLES --- */
        #game-container {
            position: relative;
            height: 100vh;
            background: linear-gradient(180deg, #ffdeeb 0%, #fff 100%);
            overflow: hidden;
        }

        .game-hud {
            position: absolute;
            top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 100;
        }

        .score-box {
            background: white; padding: 10px 20px; border-radius: 20px;
            font-weight: bold; color: var(--pink); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #player {
            position: absolute; bottom: 120px; width: 33.33%;
            display: flex; justify-content: center; font-size: 60px;
            transition: left 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 50;
        }

        .item { position: absolute; width: 33.33%; display: flex; justify-content: center; font-size: 40px; }

        /* --- CLASS LIST SECTION STYLES --- */
        #member-section { padding: 40px 20px 100px; text-align: center; }
        .search-bar {
            width: 100%; max-width: 400px; padding: 15px 25px;
            border-radius: 30px; border: 2px solid var(--pink);
            outline: none; margin-bottom: 30px; font-size: 16px;
        }

        .member-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; max-width: 1000px; margin: 0 auto;
        }

        .member-card {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 4px solid #eee;
        }

        .member-card.nu { border-color: var(--pink); }
        .member-card.nam { border-color: var(--purple); }

        .member-avatar { font-size: 40px; margin-bottom: 10px; }
